# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: 

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
    - name: Setup java
      uses: actions/setup-java@v5
      with:
         distribution: 'temurin'
         java-version: '21'
    - name: Install FFMPEG
      run: |
        sudo apt update
        sudo apt install ffmpeg -y

    - name: Install dependencies in the root folder
      run: npm ci
    - name: Install dependencies in the electron folder
      run: |
         cd electron
         npm ci
    - name: Build all
      run: npm run package-all
    - name: Zip MacOs arm64 output folder
      run: zip ./shapez-darwin-arm64.zip build_output/standalone/shapez-darwin-arm64 -r

    - name: Upload MacOs arm64 build
      uses: actions/upload-artifact@v4
      with:
        name: Mac Arm64
        path: ./shapez-darwin-arm64.zip
        
    - name: Zip MacOs x64 output
      run: zip ./shapez-darwin-x64.zip build_output/standalone/shapez-darwin-x64 -r

    - name: Upload MacOs x64 build
      uses: actions/upload-artifact@v4
      with:
        name: Mac x64
        path: ./shapez-darwin-x64.zip
    
    - name: Zip windows x64 output
      run: zip ./shapez-windows-x64.zip build_output/standalone/shapez-win32-x64 -r

    - name: Upload Windows x64 build
      uses: actions/upload-artifact@v4
      with:
        name: Windows x64
        path: ./shapez-windows-x64.zip
      
    - name: Zip windows arm64 output
      run: zip ./shapez-windows-arm64.zip build_output/standalone/shapez-win32-arm64 -r

    - name: Upload Windows arm64 build
      uses: actions/upload-artifact@v4
      with:
        name: Windows arm64
        path: ./shapez-windows-arm64.zip

    - name: Zip Linux x64 output
      run: zip ./shapez-linux-x64.zip build_output/standalone/shapez-linux-x64 -r
      
    - name: Upload Linux x64 build
      uses: actions/upload-artifact@v4
      with:
        name: Linux x64
        path: ./shapez-linux-x64.zip

    - name: Zip Linux arm64 output
      run: zip ./shapez-linux-arm64.zip build_output/standalone/shapez-linux-arm64 -r
      
    - name: Upload Linux arm64 build
      uses: actions/upload-artifact@v4
      with:
        name: Linux arm64
        path: ./shapez-linux-arm64.zip


